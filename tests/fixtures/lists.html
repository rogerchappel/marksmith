<!doctype html>
<html>
  <head>
    <title>Lists Example</title>
  </head>
  <body>
    <article>
      <h1>Working with Lists</h1>
      <p>Here is an unordered list:</p>
      <ul>
        <li>First item</li>
        <li>Second item with <strong>bold</strong> text</li>
        <li>Third item with a <a href="https://example.com">link</a></li>
      </ul>
      <p>And an ordered list:</p>
      <ol>
        <li>Step one</li>
        <li>Step two with <em>emphasis</em></li>
        <li>Step three</li>
      </ol>
      <p>Nested list:</p>
      <ul>
        <li>Parent item
          <ul>
            <li>Child item 1</li>
            <li>Child item 2</li>
          </ul>
        </li>
        <li>Another parent</li>
      </ul>
    </article>
  </body>
</html>
