<!doctype html>
<html>
  <head>
    <title>Blockquotes and Special Elements</title>
  </head>
  <body>
    <article>
      <h1>Blockquotes</h1>
      
      <blockquote>
        <p>This is a simple blockquote.</p>
      </blockquote>
      
      <blockquote>
        <p>Multi-line blockquote</p>
        <p>with multiple paragraphs</p>
        <p>inside the same quote</p>
      </blockquote>
      
      <blockquote>
        <p>Blockquote with <strong>formatted</strong> text and a <a href="https://example.com">link</a>.</p>
      </blockquote>
      
      <p>Horizontal rule below:</p>
      <hr>
      <p>Above was a horizontal rule.</p>
      
      <p>Line break test:<br>
      This should be on new line.</p>
      
      <p>Multiple breaks:<br><br><br>After breaks.</p>
    </article>
  </body>
</html>
