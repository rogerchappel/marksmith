<!doctype html>
<html>
  <head>
    <title>Links and Inline Formatting</title>
  </head>
  <body>
    <article>
      <h1>Links and Formatting</h1>
      
      <p>Here's a <a href="https://example.com">simple link</a>.</p>
      
      <p>Link with <strong>formatted</strong> text: <a href="https://test.com">Read <em>more</em> here</a></p>
      
      <p>Absolute URL: <a href="https://example.com/path?q=1&lang=en">Query params</a></p>
      
      <p>Relative URL: <a href="/about">About page</a></p>
      
      <p>Anchor link: <a href="#section">Jump to section</a></p>
      
      <p>Multiple formats: <strong>bold</strong>, <em>italic</em>, <code>inline code</code>, and <strong>very <em>strong</em></strong></p>
      
      <p><strong>Nested <em>formatting <code>with code</code></em> in bold</strong></p>
    </article>
  </body>
</html>
