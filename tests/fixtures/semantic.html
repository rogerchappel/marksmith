<!doctype html>
<html>
  <head>
    <title>Semantic HTML Structure</title>
  </head>
  <body>
    <header>
      <h1>Site Header</h1>
      <nav>
        <ul>
          <li><a href="/">Home</a></li>
          <li><a href="/about">About</a></li>
        </ul>
      </nav>
    </header>
    
    <main>
      <article>
        <h2>Article Title</h2>
        <p>Main article content here.</p>
      </article>
      
      <aside>
        <p>Related information in sidebar.</p>
      </aside>
    </main>
    
    <footer>
      <p>Copyright 2024</p>
    </footer>
  </body>
</html>
